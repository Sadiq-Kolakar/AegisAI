<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentriX Control</title>
  <style>
    body {
      font-family: 'Outfit', 'Inter', system-ui, sans-serif;
      background: #020617;
      color: #f8fafc;
      width: 280px;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .logo-box {
      background: linear-gradient(135deg, #10b981, #059669);
      width: 40px;
      height: 40px;
      border-radius: 8px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }
    h1 { font-size: 18px; margin: 0; letter-spacing: -0.5px; }
    p { font-size: 11px; color: #94a3b8; margin: 4px 0 20px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      text-align: left;
    }
    .status-row { display: flex; justify-content: space-between; align-items: center; }
    .status-text { font-size: 13px; font-weight: 600; }
    .footer { margin-top: 20px; font-size: 10px; color: #475569; }
  </style>
</head>
<body>
  <div class="logo-box">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 5v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V5l-8-3z"/></svg>
  </div>
  <h1>SentriX Agent</h1>
  <p>Secure WhatsApp Intelligence</p>
  
  <div class="status-card">
    <div class="status-row">
        <div class="status-text">Intelligence Engine</div>
        <div style="color: #10b981; font-weight: 800; font-size: 11px;">ACTIVE</div>
    </div>
  </div>

  <div class="footer">v1.1.0 • SentriX Core Analysis</div>
  <script src="popup.js"></script>
</body>
</html>
