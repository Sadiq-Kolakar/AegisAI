<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AegisAI | Intelligence Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981;
      --primary-glow: rgba(16, 185, 129, 0.2);
      --severe: #f43f5e;
      --severe-glow: rgba(244, 63, 94, 0.2);
      --mild: #fbbf24;
      --mild-glow: rgba(251, 191, 36, 0.2);
      --bg: #020617;
      --card-bg: rgba(15, 23, 42, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      background: radial-gradient(circle at 0% 0%, #0f172a 0%, #020617 100%);
    }

    .bg-blob {
      position: absolute;
      width: 600px;
      height: 600px;
      background: var(--primary-glow);
      filter: blur(120px);
      border-radius: 50%;
      z-index: -1;
      animation: float 20s infinite alternate;
    }

    .blob-1 { top: -200px; right: -100px; background: rgba(16, 185, 129, 0.1); }
    .blob-2 { bottom: -200px; left: -100px; background: rgba(56, 189, 248, 0.1); animation-delay: -5s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.1); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--card-border);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), #059669);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .logo-text h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-text p {
      margin: 4px 0 0;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stats-header {
      display: flex;
      gap: 16px;
    }

    .stat-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stat-card.severe { border-color: rgba(244, 63, 94, 0.3); }
    .stat-card.mild { border-color: rgba(251, 191, 36, 0.3); }

    .stat-card .value {
      font-size: 20px;
      font-weight: 700;
    }

    .stat-card .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Feed grid */
    .feed-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .detection-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 28px;
      border: 1px solid var(--card-border);
      overflow: hidden;
      display: flex;
      animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .detection-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .card-main {
      flex: 1;
      padding: 32px;
      display: flex;
      flex-direction: column;
    }

    .card-sidebar {
      width: 340px;
      padding: 32px;
      background: rgba(0, 0, 0, 0.2);
      border-left: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.severe { background: var(--severe-glow); color: var(--severe); border: 1px solid rgba(244, 63, 94, 0.4); }
    .badge.mild { background: var(--mild-glow); color: var(--mild); border: 1px solid rgba(251, 191, 36, 0.4); }
    .badge.safe { background: var(--primary-glow); color: var(--primary); border: 1px solid rgba(16, 185, 129, 0.4); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .investigation-id {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .timestamp {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .message-content {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      font-size: 17px;
      line-height: 1.6;
      color: #e2e8f0;
      position: relative;
    }

    .message-content::before {
      content: '"';
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 40px;
      color: rgba(255, 255, 255, 0.05);
      font-family: serif;
    }

    .analysis-report {
      margin-top: 24px;
      padding: 16px;
      background: rgba(56, 189, 248, 0.05);
      border-radius: 12px;
      border-left: 4px solid var(--accent);
    }

    .analysis-report h4 {
      margin: 0 0 8px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .analysis-report p {
      margin: 0;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .evidence-preview h4 {
      margin: 0 0 12px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1.5px;
    }

    .screenshot-frame {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .screenshot-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: zoom-in;
    }

    .no-capture {
      color: #4b5563;
      font-size: 13px;
      text-align: center;
      padding: 40px;
    }

    .empty-state {
      text-align: center;
      padding: 120px 40px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 60px;
      margin-bottom: 24px;
      opacity: 0.5;
    }

    .refresh-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 10px var(--primary-glow);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 960px) {
      .detection-card { flex-direction: column; }
      .card-sidebar { width: 100%; border-left: none; border-top: 1px solid var(--card-border); }
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
  </div>

  <div class="container">
    <header>
      <div class="logo-container">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 12c-2.67 0-8 1.33-8 4v2h16v-2c0-2.67-5.33-4-8-4z"/></svg>
        </div>
        <div class="logo-text">
          <h1>AegisAI Engine</h1>
          <p>Intelligence Terminal</p>
        </div>
      </div>
      <div class="stats-header" id="statsRoot">
        <!-- Stats populated by JS -->
      </div>
    </header>

    <main id="feedRoot">
      <div class="empty-state">
        <div class="icon">📡</div>
        <h2>Establishing Secure Feed...</h2>
        <p>Connecting to WhatsApp Observer stream.</p>
      </div>
    </main>

    <footer style="margin-top: 60px; text-align: center; color: var(--text-muted); font-size: 13px;">
      <span class="refresh-indicator"></span> Live monitoring active • Update every 15s
    </footer>
  </div>

  <script>
    async function loadDashboard() {
      try {
        const response = await fetch('/api/detections');
        const data = await response.json();
        
        const feedRoot = document.getElementById('feedRoot');
        const statsRoot = document.getElementById('statsRoot');
        
        if (!data || data.length === 0) {
          feedRoot.innerHTML = `
            <div class="empty-state">
              <div class="icon">✨</div>
              <h2>All Quiet on the Feed</h2>
              <p>No threats or suspicious activity detected recently.</p>
            </div>
          `;
          statsRoot.innerHTML = '';
          return;
        }

        let severeCount = 0;
        let mildCount = 0;

        feedRoot.innerHTML = data.map((item, index) => {
          if (item.severity === 'SEVERE') severeCount++;
          if (item.severity === 'MILD') mildCount++;

          const date = new Date(item.timestamp);
          const dateStr = date.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
          const timeStr = date.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
          const hasImage = item.screenshot && item.screenshot.startsWith('data:image');

          return `
            <div class="detection-card" style="animation-delay: ${index * 0.1}s">
              <div class="card-main">
                <div class="card-header">
                  <div>
                    <div class="investigation-id">CASE #${item.id.toString().padStart(4, '0')}</div>
                    <div class="timestamp">${timeStr} • ${dateStr}</div>
                  </div>
                  <span class="badge ${item.severity.toLowerCase()}">${item.severity}</span>
                </div>
                
                <div class="message-content">
                  ${item.text}
                </div>

                <div class="analysis-report">
                  <h4>Intelligence Analysis</h4>
                  <p>${item.reason || 'No detailed analysis provided for this entry.'}</p>
                </div>
              </div>
              
              <div class="card-sidebar">
                <div class="evidence-preview">
                  <h4>Visual Evidence</h4>
                  <div class="screenshot-frame">
                    ${hasImage ? `<img src="${item.screenshot}" alt="Investigation screenshot" onclick="window.open(this.src)">` : '<div class="no-capture">Capture unavailable for this entry.</div>'}
                  </div>
                </div>
                <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--card-border); font-size: 11px; color: var(--text-muted);">
                  Verified by AegisAI Core Analysis
                </div>
              </div>
            </div>
          `;
        }).join('');

        statsRoot.innerHTML = `
          <div class="stat-card severe">
            <div class="value" style="color: var(--severe)">${severeCount}</div>
            <div class="label">Severe</div>
          </div>
          <div class="stat-card mild">
            <div class="value" style="color: var(--mild)">${mildCount}</div>
            <div class="label">Mild</div>
          </div>
        `;

      } catch (err) {
        document.getElementById('feedRoot').innerHTML = `
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <h2>Connection Failure</h2>
            <p>Could not reach the analysis engine. Ensure the server is active.</p>
          </div>
        `;
      }
    }

    loadDashboard();
    setInterval(loadDashboard, 15000);
  </script>
</body>
</html>
/html>
